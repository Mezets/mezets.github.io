<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
html, body{
    margin:0;
    padding:0;
    font-family:'Rajdhani',sans-serif;
    background:#050000;
    overflow:hidden;
}

/* ================= BACKGROUND ================= */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.25), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.12), transparent 65%);
    filter:blur(90px);
    animation: drift 20s ease-in-out infinite;
}

@keyframes drift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(20px,-15px) scale(1.05);}
}

/* ================= LAYOUT ================= */
.main{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    height:100vh;
    z-index:2;
    position:relative;
}

/* ================= CARD ================= */
.card{
    width:340px;
    padding:28px;
    border-radius:22px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(255,0,0,0.15);

    animation: float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

/* ================= AVATARS ================= */
.avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 12px;
    border:2px solid rgba(255,0,0,0.35);
}

.server-avatar{
    width:70px;
    height:70px;
    border-radius:18px;
    object-fit:cover;
    display:block;
    margin:0 auto 10px;
    border:1px solid rgba(255,0,0,0.4);
    box-shadow:0 0 18px rgba(255,0,0,0.25);
}

/* ================= TEXT ================= */
.name{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#ff2a2a;
    margin-bottom:18px;
    text-shadow:0 0 15px rgba(255,0,0,0.3);
}

/* ================= BUTTONS (RESTORED EFFECTS) ================= */
.btn{
    display:block;
    padding:12px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;

    color:#ff3b3b;
    border-radius:12px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    position:relative;
    overflow:hidden;
    transition:0.2s;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,0,0,0.4),transparent);
    transition:0.6s;
}

.btn:hover::before{
    left:120%;
}

.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 25px rgba(255,0,0,0.35);
}

/* ================= STATS ================= */
.stats{
    text-align:center;
}

.big{
    font-size:32px;
    font-weight:700;
    color:white;
    text-shadow:0 0 12px rgba(255,0,0,0.25);
}

.label{
    font-size:12px;
    color:rgba(255,180,180,0.85);
    margin:6px 0;
}

/* ================= STARS ================= */
.stars{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:10px 0;
}

.star{
    font-size:22px;
    color:rgba(255,255,255,0.2);
    transition:0.2s;
}

.star.full{
    color:#ff2a2a;
    text-shadow:0 0 12px rgba(255,0,0,0.7);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main">

<!-- LEFT -->
<div class="card">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<!-- RIGHT -->
<div class="card stats">

    <img src="avatar_server.png" class="server-avatar">

    <div class="name" style="font-size:20px;">Discord Server</div>

    <div class="big">71 шт.</div>
    <div class="label">📦 Заказы</div>

    <div class="label">⭐ Рейтинг</div>
    <div class="stars" id="stars"></div>

    <div class="big">2023 → 2026-05-24</div>
    <div class="label">📅 Период</div>

</div>

</div>

<script>

/* ⭐ STARS FIX */
const starsEl = document.getElementById("stars");
const rating = 5;

for(let i=1;i<=5;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = "★";
    if(i <= rating) s.classList.add("full");
    starsEl.appendChild(s);
}

/* 🌌 BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let dots = [];

for(let i=0;i<120;i++){
    dots.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.4,
        dx:(Math.random()-0.5)*0.2,
        dy:(Math.random()-0.5)*0.2
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.7)";
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x<0) d.x=canvas.width;
        if(d.x>canvas.width) d.x=0;
        if(d.y<0) d.y=canvas.height;
        if(d.y>canvas.height) d.y=0;
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
