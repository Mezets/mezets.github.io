<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html, body{
    margin:0;
    padding:0;
    background:#050000;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
}

/* ===== BACKGROUND ===== */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.25), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.12), transparent 65%);
    filter:blur(90px);
    animation: drift 20s ease-in-out infinite;
}

@keyframes drift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(20px,-15px) scale(1.05);}
}

/* ===== LAYOUT ===== */
.main{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
    z-index:2;
}

/* ===== CARD ===== */
.card{
    width:360px;
    height:520px;

    padding:26px;
    border-radius:18px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);
    backdrop-filter:blur(20px);

    box-shadow:
        0 0 25px rgba(255,0,0,0.2),
        inset 0 0 15px rgba(255,0,0,0.1);

    transform-style:preserve-3d;
    transition:transform 0.08s linear, box-shadow 0.3s;
}

/* ===== AVATAR ===== */
.avatar, .server-avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    display:block;
    margin:0 auto 12px;
    border:2px solid rgba(255,0,0,0.35);
    object-fit:cover;
}

/* ===== NAME ===== */
.name{
    text-align:center;
    font-size:16px;
    color:#ff2a2a;
    margin-bottom:18px;
}

/* ===== BUTTONS ===== */
.btn{
    display:block;
    padding:10px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;

    color:#ff3b3b;
    border-radius:10px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    transition:0.2s;
    position:relative;
    overflow:hidden;
}

.btn::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,0,0,0.4),transparent);
    transform:translateX(-120%);
    transition:0.5s;
}

.btn:hover::after{
    transform:translateX(120%);
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 22px rgba(255,0,0,0.4);
}

/* ===== BLOCKS ===== */
.block{
    margin:14px 0;
    text-align:center;
}

.label{
    font-size:9px;
    color:rgba(255,180,180,0.85);
}

.value{
    font-size:16px;
    color:#fff;
    margin-top:6px;
}

/* ===== STARS ===== */
.stars{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-top:10px;
}

.star{
    font-size:20px;
    color:rgba(255,255,255,0.2);
    transition:0.3s;
}

.star.full{
    color:#ff2a2a;
    animation:starPop 0.4s ease forwards;
}

@keyframes starPop{
    0%{transform:scale(0.4) rotate(0deg);}
    100%{transform:scale(1.2) rotate(360deg);}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main">

<div class="card" id="leftCard">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<div class="card" id="rightCard">

    <img src="avatar_server.png" class="server-avatar">
    <div class="name">Discord Server</div>

    <div class="block">
        <div class="label">Заказы</div>
        <div class="value" id="orders">0</div>
    </div>

    <div class="block">
        <div class="label">Рейтинг</div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="block">
        <div class="label">Период ➜</div>
        <div class="value">2023 → 2026-05-24</div>
    </div>

</div>

</div>

<script>

/* ===== 3D TILT (stronger) ===== */
const cards = document.querySelectorAll(".card");

cards.forEach(card=>{
    card.addEventListener("mousemove",(e)=>{
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left)/r.width;
        const y = (e.clientY - r.top)/r.height;

        const rotY = (x - 0.5) * 25;
        const rotX = (y - 0.5) * -25;

        card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(10px)`;
    });

    card.addEventListener("mouseleave",()=>{
        card.style.transform = "rotateX(0) rotateY(0)";
    });
});

/* ===== STARS ===== */
const starsEl = document.getElementById("stars");
const rating = 5;

for(let i=0;i<5;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = "★";
    starsEl.appendChild(s);
}

let i = 0;
(function animStars(){
    if(i < rating){
        starsEl.children[i].classList.add("full");
        i++;
        setTimeout(animStars,150);
    }
})();

/* ===== ORDERS ANIMATION ===== */
const ordersEl = document.getElementById("orders");
let count = 0;
const target = 71;

(function countUp(){
    if(count < target){
        count++;
        ordersEl.textContent = count;
        requestAnimationFrame(()=>setTimeout(countUp,15));
    }
})();

/* ===== BACKGROUND ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let dots = [];

for(let i=0;i<130;i++){
    dots.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:Math.random()*1.6,
        dx:(Math.random()-0.5)*0.25,
        dy:(Math.random()-0.5)*0.25
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.75)";
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x < -10) d.x = canvas.width + 10;
        if(d.x > canvas.width + 10) d.x = -10;
        if(d.y < -10) d.y = canvas.height + 10;
        if(d.y > canvas.height + 10) d.y = -10;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
