<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html, body{
    margin:0;
    padding:0;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:#050000;
}

body::before{
    content:"";
    position:fixed;
    inset:-50%;
    background:
        radial-gradient(circle at 30% 30%, rgba(255,0,0,0.25), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.15), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255,0,0,0.1), transparent 50%);
    filter:blur(70px);
    animation:move 12s ease-in-out infinite alternate;
    z-index:0;
}

@keyframes move{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(60px,-40px) scale(1.1);}
}

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:40px;
    position:relative;
    z-index:2;
}

.card{
    width:340px;
    height:420px;
    padding:20px;
    border-radius:16px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    backdrop-filter:blur(20px);
    box-shadow:0 0 25px rgba(255,0,0,0.25);

    transform-style:preserve-3d;
    transition:transform 0.08s ease;
}

.avatar, .server-avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    object-position:center;
    display:block;
    margin:0 auto 10px;
    border:2px solid rgba(255,0,0,0.35);
}

.name{
    text-align:center;
    font-size:14px;
    color:#ff2a2a;
    margin-bottom:12px;
}

.btn{
    display:block;
    padding:9px;
    margin:7px 0;
    text-align:center;

    color:#ff3b3b;
    text-decoration:none;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);
    border-radius:10px;

    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 18px rgba(255,0,0,0.4);
}

.block{
    margin:10px 0;
    text-align:center;
}

.label{
    font-size:8px;
    color:rgba(255,180,180,0.85);
}

.value{
    font-size:14px;
    color:white;
    margin-top:5px;
    transition:0.3s;
}

.online{
    font-size:10px;
    color:#00ff88;
    margin-top:6px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div class="main">

<div class="card" id="leftCard">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<div class="card" id="rightCard">

    <img src="avatar_server.png" class="server-avatar">
    <div class="name">Discord Server</div>

    <div class="block">
        <div class="label">Заказы</div>
        <div class="value" id="orders">...</div>
    </div>

    <div class="block">
        <div class="label">Рейтинг</div>
        <div class="value" id="rating">...</div>
    </div>

    <div class="block">
        <div class="label">Период</div>
        <div class="value" id="period">...</div>
    </div>

    <div class="block">
        <div class="label">Онлайн</div>
        <div class="online" id="online">...</div>
    </div>

    <a class="btn" href="http://discord.gg/npZ3QDQjVR" target="_blank">
        Join Discord
    </a>

</div>

</div>

<script>

document.addEventListener("mousemove",(e)=>{
    const x = (e.clientX / innerWidth - 0.5);
    const y = (e.clientY / innerHeight - 0.5);

    document.querySelectorAll(".card").forEach(card=>{
        card.style.transform = `
            rotateX(${y * -20}deg)
            rotateY(${x * 20}deg)
            translateZ(20px)
        `;
    });
});

function setText(id, value){
    const el = document.getElementById(id);
    if(!el) return;

    el.style.opacity = 0;

    setTimeout(()=>{
        el.textContent = value;
        el.style.opacity = 1;
    },120);
}

async function loadStats(){
    try{
        const res = await fetch("https://mez-production.up.railway.app/stats");
        const data = await res.json();

        setText("orders", data.total_orders);
        setText("rating", data.average_rating);
        setText("period", data.period);
        setText("online", data.online + " online");

    } catch(e){
        setText("orders", "—");
        setText("rating", "—");
        setText("period", "—");
        setText("online", "offline");
        console.log("API error:", e);
    }
}

loadStats();
setInterval(loadStats, 5000);

</script>

</body>
</html>
