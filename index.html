<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, sans-serif;
    background:#0b1020;
}

/* 🌌 canvas background */
canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:0;
}

/* 💠 card */
.card{
    position:relative;
    z-index:1;
    width:360px;
    padding:35px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    animation:float 5s ease-in-out infinite;
    box-shadow:0 0 40px rgba(0,255,255,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 0 60px rgba(0,255,255,0.18);
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,59,59,0.35);
    margin-bottom:18px;
    box-shadow:0 0 25px rgba(255,59,59,0.25);
}

.name{
    color:#fff;
    font-size:32px;
    font-weight:700;
    text-shadow:0 0 15px rgba(255,59,59,0.5);
}

.subtitle{
    color:#9ca3af;
    margin:10px 0 25px;
}

/* ⚡ neon buttons */
.btn{
    display:block;
    text-decoration:none;
    color:#ff3b3b;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    background:rgba(255,59,59,0.05);
    border:1px solid rgba(255,59,59,0.25);
    transition:0.25s;
    letter-spacing:0.5px;
    position:relative;
    overflow:hidden;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(0,245,255,0.25), transparent);
    transition:0.5s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:scale(1.06);
    box-shadow:0 0 20px rgba(255,59,59,0.45);
    background:rgba(255,59,59,0.12);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">
    <img src="avatar.png" class="avatar" alt="avatar">

    <div class="name">Mezets</div>
    <div class="subtitle">Cyber Gaming Profile</div>

    <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
    <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">FACEIT</a>
    <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
    <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>
</div>

<script>
/* ✨ particle system */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5)*0.6,
        dy:(Math.random()-0.5)*0.6
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,59,59,0.7)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
