<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* 🌍 GLOBAL FIX FONT */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Rajdhani',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050000;
}

/* 🌌 BACKGROUND */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* 🔴 GLASS NEBULA */
.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.22), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.12), transparent 65%);
    filter:blur(100px);
}

/* 📦 LAYOUT */
.main-container{
    display:flex;
    gap:40px;
    z-index:2;
}

/* 🧊 GLASS CARDS (FIXED) */
.card{
    width:340px;
    padding:28px;
    border-radius:22px;

    background:rgba(255,0,0,0.06);
    border:1px solid rgba(255,0,0,0.25);

    backdrop-filter:blur(18px);
    box-shadow:0 0 35px rgba(255,0,0,0.15);
}

/* 👤 AVATAR */
.avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 12px;
    border:2px solid rgba(255,0,0,0.35);
}

/* 🧠 NAME */
.name{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#ff2a2a;
    margin-bottom:18px;
}

/* 🔘 BUTTONS (RESTORED EFFECTS) */
.btn{
    display:block;
    padding:12px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;
    color:#ff3b3b;

    border-radius:12px;
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    position:relative;
    overflow:hidden;
    transition:0.2s;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,0,0,0.35),transparent);
    transition:0.5s;
}

.btn:hover::before{ left:120%; }

.btn:hover{
    transform:scale(1.06);
    box-shadow:0 0 25px rgba(255,0,0,0.35);
}

/* 📊 STATS CENTER */
.stats{
    text-align:center;
}

/* 🔥 BIG NUMBERS */
.big{
    font-size:28px;
    font-weight:700;
    color:white;
}

/* 📌 LABELS */
.label{
    font-size:12px;
    color:rgba(255,170,170,0.85);
    margin:6px 0;
}

/* ⭐ STARS */
.stars{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:10px 0;
}

.star{
    font-size:22px;
    color:rgba(255,255,255,0.2);
}

.star.full{
    color:#ff2a2a;
    text-shadow:0 0 10px rgba(255,0,0,0.6);
}

/* 🟣 SERVER AVATAR FIX (styled, not plain image) */
.server-avatar{
    width:70px;
    height:70px;
    border-radius:18px;
    object-fit:cover;
    display:block;
    margin:0 auto 10px;

    border:1px solid rgba(255,0,0,0.4);
    box-shadow:0 0 20px rgba(255,0,0,0.25);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main-container">

<!-- PROFILE -->
<div class="card">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<!-- STATS -->
<div class="card stats">

    <!-- SERVER AVATAR (FIXED STYLE) -->
    <img src="avatar_server.png" class="server-avatar">

    <div class="name" style="font-size:20px;">Discord Server</div>

    <!-- ORDERS -->
    <div class="big">71 шт.</div>
    <div class="label">📦 Заказы</div>

    <!-- STARS -->
    <div class="label">⭐ Рейтинг</div>
    <div class="stars" id="stars"></div>

    <!-- PERIOD -->
    <div class="big">С 2023 по 2026-05-24 23:41</div>
    <div class="label">📅 Период</div>

</div>

</div>

<script>
/* ⭐ STARS (100% SAFE) */
window.onload = function(){
    const container = document.getElementById("stars");
    const rating = 5;

    for(let i=1;i<=5;i++){
        const star = document.createElement("div");
        star.className = "star";
        star.textContent = "★";

        if(i<=rating) star.classList.add("full");

        container.appendChild(star);
    }
};

/* 🌌 BACKGROUND */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.3,
        dx:(Math.random()-0.5)*0.15,
        dy:(Math.random()-0.5)*0.15
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let s of stars){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.6)";
        ctx.fill();

        s.x+=s.dx;
        s.y+=s.dy;

        if(s.x<0) s.x=canvas.width;
        if(s.x>canvas.width) s.x=0;
        if(s.y<0) s.y=canvas.height;
        if(s.y>canvas.height) s.y=0;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
