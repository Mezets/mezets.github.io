<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mezets</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html,body{
    margin:0;
    padding:0;
    background:#050000;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,.25), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,.12), transparent 65%);
    filter:blur(90px);
    animation:drift 20s ease-in-out infinite;
}

@keyframes drift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(20px,-15px) scale(1.05);}
}

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    height:100vh;
    position:relative;
    z-index:2;
}

.card{
    width:360px;
    height:520px;

    padding:26px;
    border-radius:18px;

    background:rgba(255,0,0,.05);
    border:1px solid rgba(255,0,0,.25);

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 25px rgba(255,0,0,.2),
        inset 0 0 15px rgba(255,0,0,.1);

    transform-style:preserve-3d;
    transition:transform .08s linear;
}

.avatar,
.server-avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    display:block;
    margin:0 auto 12px;
    object-fit:cover;
    border:2px solid rgba(255,0,0,.35);
}

.name{
    text-align:center;
    font-size:16px;
    color:#ff2a2a;
    margin-bottom:18px;
}

.btn{
    display:block;
    padding:10px;
    margin:8px 0;

    text-align:center;
    text-decoration:none;

    color:#ff3b3b;

    border-radius:10px;
    border:1px solid rgba(255,0,0,.25);

    background:rgba(255,0,0,.05);

    transition:.2s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 22px rgba(255,0,0,.35);
}

.block{
    margin:16px 0;
    text-align:center;
}

.label{
    font-size:9px;
    color:rgba(255,180,180,.85);
}

.value{
    margin-top:8px;
    font-size:14px;
    color:white;
}

.stars{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-top:8px;
}

.star{
    color:rgba(255,255,255,.2);
    font-size:20px;
}

.star.full{
    color:#ff2a2a;
}

.online{
    color:#00ff88;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main">

    <!-- LEFT -->

    <div class="card">

        <img src="avatar.png" class="avatar">

        <div class="name">Mezets</div>

        <a class="btn" href="https://steamcommunity.com/" target="_blank" rel="noopener noreferrer">
            Steam
        </a>

        <a class="btn" href="https://www.faceit.com/" target="_blank" rel="noopener noreferrer">
            FACEIT
        </a>

        <a class="btn" href="https://www.epicgames.com/" target="_blank" rel="noopener noreferrer">
            Epic Games
        </a>

        <a class="btn" href="https://www.roblox.com/" target="_blank" rel="noopener noreferrer">
            Roblox
        </a>

    </div>

    <!-- RIGHT -->

    <div class="card">

        <img src="avatar_server.png" class="server-avatar">

        <div class="name">Discord Server</div>

        <div class="block">
            <div class="label">Заказы</div>
            <div class="value" id="orders">Загрузка...</div>
        </div>

        <div class="block">
            <div class="label">Рейтинг</div>
            <div class="stars" id="stars"></div>
        </div>

        <div class="block">
            <div class="label">Период</div>
            <div class="value" id="period">Загрузка...</div>
        </div>

        <div class="block">
            <div class="label">Онлайн</div>
            <div class="value online" id="online">Загрузка...</div>
        </div>

        <a class="btn"
           href="https://discord.gg/npZ3QDQjVR"
           target="_blank"
           rel="noopener noreferrer">
            Join Discord
        </a>

    </div>

</div>

<script>

/* 3D */

document.querySelectorAll(".card").forEach(card=>{

    card.addEventListener("mousemove",(e)=>{

        const r = card.getBoundingClientRect();

        const x = (e.clientX - r.left)/r.width;
        const y = (e.clientY - r.top)/r.height;

        const rotY = (x - 0.5) * 25;
        const rotX = (y - 0.5) * -25;

        card.style.transform =
            `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });

    card.addEventListener("mouseleave",()=>{
        card.style.transform =
            "rotateX(0deg) rotateY(0deg)";
    });

});

/* STARS */

function renderStars(rating){

    const stars = document.getElementById("stars");

    stars.innerHTML = "";

    for(let i=1;i<=5;i++){

        const star = document.createElement("div");

        star.className = "star";

        if(i <= Math.round(rating)){
            star.classList.add("full");
        }

        star.textContent = "★";

        stars.appendChild(star);
    }
}

/* API */

async function loadStats(){

    try{

        const response =
            await fetch("https://mez-production.up.railway.app/stats");

        const data =
            await response.json();

        document.getElementById("orders").textContent =
            data.total_orders ?? "0";

        document.getElementById("period").textContent =
            data.period ?? "—";

        document.getElementById("online").textContent =
            (data.online ?? 0) + " online";

        const rating =
            parseFloat(data.average_rating) || 0;

        renderStars(rating);

    }
    catch(err){

        console.error(err);

        document.getElementById("orders").textContent =
            "Ошибка";

        document.getElementById("period").textContent =
            "Ошибка";

        document.getElementById("online").textContent =
            "Ошибка";
    }
}

loadStats();
setInterval(loadStats,5000);

/* BACKGROUND */

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

resize();

window.addEventListener("resize",resize);

const dots = [];

for(let i=0;i<130;i++){

    dots.push({

        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,

        r:Math.random()*1.6,

        dx:(Math.random()-0.5)*0.25,
        dy:(Math.random()-0.5)*0.25
    });
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const d of dots){

        ctx.beginPath();

        ctx.arc(
            d.x,
            d.y,
            d.r,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
            "rgba(255,0,0,.75)";

        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x < -10) d.x = canvas.width + 10;
        if(d.x > canvas.width + 10) d.x = -10;

        if(d.y < -10) d.y = canvas.height + 10;
        if(d.y > canvas.height + 10) d.y = -10;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
