<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html, body{
    margin:0;
    padding:0;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:#050000;
}

/* ===== MOVING RED BACKGROUND ===== */
body::before{
    content:"";
    position:fixed;
    inset:-40%;
    background: radial-gradient(circle at 30% 30%, rgba(255,0,0,0.25), transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(255,0,0,0.15), transparent 45%),
                radial-gradient(circle at 40% 80%, rgba(255,0,0,0.12), transparent 50%);
    animation: flow 10s ease-in-out infinite alternate;
    filter: blur(60px);
    z-index:0;
}

@keyframes flow{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(60px,-40px) scale(1.1);}
}

/* ===== CANVAS ===== */
canvas{
    position:fixed;
    inset:0;
    z-index:1;
}

/* ===== LAYOUT ===== */
.main{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
    z-index:2;
}

/* ===== CARD ===== */
.card{
    width:340px;
    height:420px;

    padding:20px;
    border-radius:16px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 20px rgba(255,0,0,0.2),
        inset 0 0 12px rgba(255,0,0,0.1);

    transform-style:preserve-3d;
    transition:transform 0.1s ease;
}

/* ===== AVATAR ===== */
.avatar, .server-avatar{
    width:105px;
    height:105px;
    border-radius:50%;
    display:block;
    margin:0 auto 10px;
    border:2px solid rgba(255,0,0,0.35);
}

/* ===== TEXT ===== */
.name{
    text-align:center;
    font-size:14px;
    color:#ff2a2a;
    margin-bottom:14px;
}

/* ===== BUTTON ===== */
.btn{
    display:block;
    padding:9px;
    margin:7px 0;
    text-align:center;
    text-decoration:none;

    color:#ff3b3b;
    border-radius:10px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    transition:0.2s;
    position:relative;
    overflow:hidden;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 18px rgba(255,0,0,0.4);
}

/* ===== BLOCKS ===== */
.block{
    margin:10px 0;
    text-align:center;
}

.label{
    font-size:8px;
    color:rgba(255,180,180,0.85);
}

.value{
    font-size:14px;
    color:#fff;
    margin-top:5px;
}

/* ===== STARS ===== */
.stars{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-top:8px;
}

.star{
    font-size:20px;
    color:rgba(255,255,255,0.2);
}

.star.full{
    color:#ff2a2a;
    animation:pop 0.4s ease;
}

@keyframes pop{
    0%{transform:scale(0.4) rotate(0deg);}
    100%{transform:scale(1.1) rotate(360deg);}
}

/* ===== ONLINE ===== */
.online{
    color:#00ff88;
    font-size:10px;
    margin-top:6px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{opacity:0.6;}
    50%{opacity:1;}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="main">

<!-- LEFT -->
<div class="card" id="leftCard">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<!-- RIGHT -->
<div class="card" id="rightCard">

    <img src="avatar_server.png" class="server-avatar">
    <div class="name">Discord Server</div>

    <div class="block">
        <div class="label">Заказы</div>
        <div class="value" id="orders">0</div>
    </div>

    <div class="block">
        <div class="label">Рейтинг</div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="block">
        <div class="label">Период</div>
        <div class="value">2023 по 2026-05-24</div>
    </div>

    <div class="block">
        <div class="label">Онлайн</div>
        <div class="online" id="online">0 online</div>
    </div>

    <a class="btn" href="http://discord.gg/npZ3QDQjVR" target="_blank">
        Join Discord
    </a>

</div>

</div>

<script>

/* ===== 3D EFFECT ===== */
document.addEventListener("mousemove",(e)=>{
    const x = (e.clientX / innerWidth - 0.5);
    const y = (e.clientY / innerHeight - 0.5);

    document.querySelectorAll(".card").forEach(card=>{
        card.style.transform = `
            rotateX(${y * -25}deg)
            rotateY(${x * 25}deg)
            translateZ(25px)
        `;
    });
});

/* ===== STARS ===== */
const starsEl = document.getElementById("stars");
const rating = 5;

for(let i=0;i<5;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = "★";
    starsEl.appendChild(s);
}

let si = 0;
(function runStars(){
    if(si < rating){
        starsEl.children[si].classList.add("full");
        si++;
        setTimeout(runStars,140);
    }
})();

/* ===== ORDERS ===== */
const ordersEl = document.getElementById("orders");
let c = 0;
const target = 71;

(function count(){
    if(c < target){
        c++;
        ordersEl.textContent = c;
        setTimeout(count,15);
    }
})();

/* ===== ONLINE FAKE COUNTER ===== */
const onlineEl = document.getElementById("online");
let online = 18;

setInterval(()=>{
    online += Math.floor(Math.random()*3 - 1);
    if(online < 5) online = 5;
    if(online > 42) online = 42;
    onlineEl.textContent = online + " online";
},1200);

/* ===== BACKGROUND ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let dots = [];

for(let i=0;i<140;i++){
    dots.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:Math.random()*1.5,
        dx:(Math.random()-0.5)*0.25,
        dy:(Math.random()-0.5)*0.25
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.7)";
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x < -10) d.x = canvas.width + 10;
        if(d.x > canvas.width + 10) d.x = -10;
        if(d.y < -10) d.y = canvas.height + 10;
        if(d.y > canvas.height + 10) d.y = -10;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
