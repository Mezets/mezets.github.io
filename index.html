<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Orbitron', 'Segoe UI', sans-serif !important;
}
    
body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050000;
}

/* 🌌 stars */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* 🔴 slow red nebula */
.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;

    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.22), transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(180,0,0,0.12), transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent 65%);

    filter: blur(85px);
    animation:redDrift 25s ease-in-out infinite;
}

@keyframes redDrift{
    0%,100%{transform:translate(0,0) scale(1);}
    25%{transform:translate(20px,-10px) scale(1.05);}
    50%{transform:translate(-15px,15px) scale(1.08);}
    75%{transform:translate(10px,20px) scale(1.03);}
}

/* 📦 КОНТЕЙНЕР ДЛЯ ДВУХ КАРТОЧЕК */
.main-container {
    display: flex;
    gap: 40px;
    z-index: 2;
    transform-style: preserve-3d;
}

/* 💠 CARD (POWERED 3D) */
.card{
    position:relative;
    width:340px;
    padding:28px;
    text-align:center;
    border-radius:20px;
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.3);
    backdrop-filter:blur(25px);
    transform-style:preserve-3d;
    transition:transform 0.08s linear;
    animation:cardBreath 6s ease-in-out infinite;
    box-shadow:
        0 0 25px rgba(255,0,0,0.2),
        0 0 60px rgba(255,0,0,0.08);
}

/* Вторая карточка со статистикой */
.stats-card {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left;
}

@keyframes cardBreath{
    0%,100%{
        box-shadow:
            0 0 25px rgba(255,0,0,0.15),
            0 0 60px rgba(255,0,0,0.05);
    }
    50%{
        box-shadow:
            0 0 45px rgba(255,0,0,0.3),
            0 0 100px rgba(255,0,0,0.1);
    }
}

/* avatar */
.avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,0,0,0.4);
    margin: 0 auto 12px auto;
    box-shadow:0 0 18px rgba(255,0,0,0.25);
    display: block;
}

/* ✨ NAME (NEON CORE BREATH) */
.name{
    font-size:30px;
    font-weight:700;
    margin-bottom:18px;
    color:#ff2a2a;
    letter-spacing:2px;
    text-shadow:
        0 0 8px rgba(255,0,0,0.6),
        0 0 20px rgba(255,0,0,0.3),
        0 0 2px rgba(255,255,255,0.4);
    animation:breath 4s ease-in-out infinite;
    text-align: center;
}

@keyframes breath{
    0%,100%{
        transform:scale(1);
        text-shadow:
            0 0 6px rgba(255,0,0,0.4),
            0 0 18px rgba(255,0,0,0.2);
    }
    50%{
        transform:scale(1.05);
        text-shadow:
            0 0 14px rgba(255,0,0,0.8),
            0 0 30px rgba(255,0,0,0.4),
            0 0 2px rgba(255,255,255,0.5);
    }
}

/* 🔘 BUTTONS (POWER UI) */
.btn{
    display:block;
    text-decoration:none;
    color:#ff3b3b;
    padding:12px;
    margin:8px 0;
    border-radius:12px;
    background:rgba(255,0,0,0.06);
    border:1px solid rgba(255,0,0,0.25);
    position:relative;
    overflow:hidden;
    transition:0.2s ease;
    text-align: center;
    font-weight: 600;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,0,0,0.35), transparent);
    transition:0.5s;
}

.btn:hover::before{
    left:120%;
}

.btn:hover{
    transform:scale(1.06) translateY(-2px);
    box-shadow:
        0 0 20px rgba(255,0,0,0.35),
        0 0 45px rgba(255,0,0,0.15);
    background:rgba(255,0,0,0.14);
}

.btn:active{
    transform:scale(0.98);
}

/* 📊 СТИЛИ ДЛЯ СТАТИСТИКИ */
.stat-block {
    margin-bottom: 24px;
}

.stat-label {
    font-size: 10px;
    color: rgba(255, 40, 40, 0.85);
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 600;
}

.stat-value {
    font-size: 13px;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<div class="nebula" id="nebula"></div>

<div class="main-container" id="mainContainer">

    <!-- Левая карточка (Профиль) -->
    <div class="card" id="card1">
        <img src="avatar.png" class="avatar">
        <div class="name">Mezets</div>
        <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
        <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">FACEIT</a>
        <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
        <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>
    </div>

    <!-- Правая карточка (Статистика Дискорд) -->
    <div class="card stats-card" id="card2">
        <div class="name" style="font-size: 22px; margin-bottom: 28px;">Discord Bot</div>
        
        <div class="stat-block">
            <div class="stat-label">📦 Total Orders Done</div>
            <div class="stat-value" id="totalOrders">LOADING...</div>
        </div>

        <div class="stat-block">
            <div class="stat-label">⭐ Average Rating</div>
            <div class="stat-value" id="avgRating">LOADING...</div>
        </div>

        <div class="stat-block">
            <div class="stat-label">📅 Order Execution Period</div>
            <div class="stat-value" id="period">LOADING...</div>
        </div>
    </div>

</div>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.3,
        dx:(Math.random()-0.5)*0.15,
        dy:(Math.random()-0.5)*0.15
    });
}

let mx = 0, my = 0;
let cx = 0, cy = 0;

const mainContainer = document.getElementById("mainContainer");
const nebula = document.getElementById("nebula");

document.addEventListener("mousemove",(e)=>{
    mx = (e.clientX / innerWidth - 0.5) * 35;
    my = (e.clientY / innerHeight - 0.5) * 25;
});

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    cx += (mx - cx) * 0.02;
    cy += (my - cy) * 0.02;

    for(let s of stars){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.6)";
        ctx.fill();

        s.x += s.dx + cx*0.03;
        s.y += s.dy + cy*0.03;

        if(s.x<0) s.x=canvas.width;
        if(s.x>canvas.width) s.x=0;
        if(s.y<0) s.y=canvas.height;
        if(s.y>canvas.height) s.y=0;
    }

    nebula.style.transform = `translate(${cx*0.5}px, ${cy*0.5}px) scale(1.05)`;

    mainContainer.style.transform = `
        perspective(900px)
        rotateY(${cx * 0.5}deg)
        rotateX(${-cy * 0.5}deg)
    `;

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

function fetchStats() {
    fetch("https://mez-api-production.up.railway.app/stats")
        .then(response => response.json())
        .then(data => {
            if (!data.error) {
                let ordersText = data.total_orders.replace("шт.", "pcs");
                let periodText = data.period.replace("С 2023 года по", "From 2023 to");
                
                document.getElementById("totalOrders").textContent = ordersText;
                document.getElementById("avgRating").textContent = data.average_rating;
                document.getElementById("period").textContent = periodText;
            } else {
                showError();
            }
        })
        .catch(err => {
            console.error("Ошибка сети:", err);
            showError();
        });
}

function showError() {
    document.getElementById("totalOrders").textContent = "ERROR";
    document.getElementById("avgRating").textContent = "ERROR";
    document.getElementById("period").textContent = "ERROR";
}

fetchStats();
</script>

</body>
</html>
