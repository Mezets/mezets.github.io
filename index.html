<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html, body{
    margin:0;
    padding:0;
    background:#050000;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
}

/* ===== BACKGROUND ===== */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.25), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.12), transparent 65%);
    filter:blur(90px);
    transition:transform 0.2s ease;
}

/* ===== LAYOUT ===== */
.main{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
    z-index:2;
}

/* ===== CARD ===== */
.card{
    width:360px;
    height:460px;

    padding:22px;
    border-radius:18px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 20px rgba(255,0,0,0.2),
        inset 0 0 15px rgba(255,0,0,0.1);

    transform-style:preserve-3d;
    transition:transform 0.08s linear;
}

/* ===== AVATAR ===== */
.avatar, .server-avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    display:block;
    margin:0 auto 10px;
    border:2px solid rgba(255,0,0,0.35);
    object-fit:cover;
}

/* ===== TEXT ===== */
.name{
    text-align:center;
    font-size:15px;
    color:#ff2a2a;
    margin-bottom:14px;
}

/* ===== BUTTONS ===== */
.btn{
    display:block;
    padding:10px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;

    color:#ff3b3b;
    border-radius:10px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    transition:0.2s;
    position:relative;
    overflow:hidden;
}

.btn::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,0,0,0.4),transparent);
    transform:translateX(-120%);
    transition:0.5s;
}

.btn:hover::after{
    transform:translateX(120%);
}

.btn:hover{
    transform:scale(1.06);
    box-shadow:0 0 18px rgba(255,0,0,0.35);
}

/* ===== BLOCKS ===== */
.block{
    margin:12px 0;
    text-align:center;
}

.label{
    font-size:9px;
    color:rgba(255,180,180,0.85);
}

.value{
    font-size:15px;
    color:#fff;
    margin-top:6px;
}

/* ===== STARS ===== */
.stars{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-top:10px;
}

.star{
    font-size:22px;
    color:rgba(255,255,255,0.2);
}

.star.full{
    color:#ff2a2a;
    animation:pop 0.4s ease;
}

@keyframes pop{
    0%{transform:scale(0.4) rotate(0deg);}
    100%{transform:scale(1.15) rotate(360deg);}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="nebula" id="nebula"></div>

<div class="main">

<div class="card" id="leftCard">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<div class="card" id="rightCard">

    <img src="avatar_server.png" class="server-avatar">
    <div class="name">Discord Server</div>

    <div class="block">
        <div class="label">Заказы</div>
        <div class="value" id="orders">0</div>
    </div>

    <div class="block">
        <div class="label">Рейтинг</div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="block">
        <div class="label">Период</div>
        <div class="value">2023 по 2026-05-24</div>
    </div>

</div>

</div>

<script>

/* ===== 3D CARDS (stronger + floating depth) ===== */
const cards = document.querySelectorAll(".card");
const nebula = document.getElementById("nebula");

document.addEventListener("mousemove",(e)=>{
    const x = (e.clientX / innerWidth - 0.5);
    const y = (e.clientY / innerHeight - 0.5);

    nebula.style.transform = `translate(${x*20}px, ${y*20}px) scale(1.05)`;

    cards.forEach(card=>{
        card.style.transform = `
            rotateX(${y * -30}deg)
            rotateY(${x * 30}deg)
            translateZ(20px)
        `;
    });
});

/* ===== STARS ===== */
const starsEl = document.getElementById("stars");
const rating = 5;

for(let i=0;i<5;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = "★";
    starsEl.appendChild(s);
}

let si = 0;
(function runStars(){
    if(si < rating){
        starsEl.children[si].classList.add("full");
        si++;
        setTimeout(runStars,140);
    }
})();

/* ===== ORDERS COUNT ===== */
const ordersEl = document.getElementById("orders");
let c = 0;
const target = 71;

(function count(){
    if(c < target){
        c++;
        ordersEl.textContent = c;
        requestAnimationFrame(()=>setTimeout(count,12));
    }
})();

/* ===== BACKGROUND PARTICLES ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let dots = [];

for(let i=0;i<140;i++){
    dots.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:Math.random()*1.5,
        dx:(Math.random()-0.5)*0.25,
        dy:(Math.random()-0.5)*0.25
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.7)";
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x < -10) d.x = canvas.width + 10;
        if(d.x > canvas.width + 10) d.x = -10;
        if(d.y < -10) d.y = canvas.height + 10;
        if(d.y > canvas.height + 10) d.y = -10;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
