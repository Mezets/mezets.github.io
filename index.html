<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html, body{
    margin:0;
    padding:0;
    background:#050000;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.25), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.12), transparent 65%);
    filter:blur(90px);
    animation: drift 20s ease-in-out infinite;
}

@keyframes drift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(20px,-15px) scale(1.05);}
}

.main{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    height:100vh;
    position:relative;
    z-index:2;
}

.card{
    width:340px;
    padding:26px;
    border-radius:18px;
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(255,0,0,0.15);
    transform-style:preserve-3d;
    transition:transform 0.15s ease;
}

.avatar, .server-avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    display:block;
    margin:0 auto 12px;
    border:2px solid rgba(255,0,0,0.35);
    object-fit:cover;
}

.name{
    text-align:center;
    font-size:18px;
    color:#ff2a2a;
    margin-bottom:16px;
}

.btn{
    display:block;
    padding:10px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;
    color:#ff3b3b;
    border-radius:10px;
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,0,0,0.3);
}

.stats{
    text-align:center;
}

.block{
    margin:14px 0;
}

.label{
    font-size:10px;
    color:rgba(255,180,180,0.85);
}

.value{
    font-size:18px;
    color:#fff;
    margin-top:8px;
    display:block;
}

.stars{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-top:10px;
}

.star{
    color:rgba(255,255,255,0.2);
    font-size:16px;
}

.star.full{
    color:#ff2a2a;
    animation:pop 0.4s ease forwards;
}

@keyframes pop{
    0%{transform:scale(0.5) rotate(0deg);}
    100%{transform:scale(1) rotate(360deg);}
}

@keyframes countUp{
    from{filter:blur(6px); transform:translateY(6px);}
    to{filter:blur(0); transform:translateY(0);}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main">

<div class="card" id="leftCard">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn" href="#">Steam</a>
    <a class="btn" href="#">FACEIT</a>
    <a class="btn" href="#">Epic Games</a>
    <a class="btn" href="#">Roblox</a>
</div>

<div class="card stats" id="rightCard">

    <img src="avatar_server.png" class="server-avatar">
    <div class="name">Discord Server</div>

    <div class="block">
        <div class="label">Заказы</div>
        <span class="value" id="orders">0</span>
    </div>

    <div class="block">
        <div class="label">Рейтинг</div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="block">
        <div class="label">Период</div>
        <span class="value" id="period">2023 → 2026-05-24</span>
    </div>

</div>

</div>

<script>

const leftCard = document.getElementById("leftCard");
const rightCard = document.getElementById("rightCard");

function tilt(card, e){
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top) / r.height;

    const rotX = (y - 0.5) * -12;
    const rotY = (x - 0.5) * 12;

    card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}

[leftCard, rightCard].forEach(card=>{
    card.addEventListener("mousemove", e=>tilt(card,e));
    card.addEventListener("mouseleave", ()=>card.style.transform="rotateX(0) rotateY(0)");
});

const starsEl = document.getElementById("stars");
const rating = 5;

for(let i=1;i<=5;i++){
    const s = document.createElement("div");
    s.className = "star";
    s.textContent = "★";
    starsEl.appendChild(s);
}

let starIndex = 0;
function animateStars(){
    if(starIndex < rating){
        starsEl.children[starIndex].classList.add("full");
        starIndex++;
        setTimeout(animateStars, 200);
    }
}
animateStars();

const ordersEl = document.getElementById("orders");
let orders = 0;
const targetOrders = 71;

function countOrders(){
    if(orders < targetOrders){
        orders++;
        ordersEl.textContent = orders;
        requestAnimationFrame(()=>setTimeout(countOrders, 20));
    }
}
countOrders();

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let dots = [];

for(let i=0;i<120;i++){
    dots.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:Math.random()*1.4,
        dx:(Math.random()-0.5)*0.2,
        dy:(Math.random()-0.5)*0.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.7)";
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x < -5) d.x = canvas.width + 5;
        if(d.x > canvas.width + 5) d.x = -5;
        if(d.y < -5) d.y = canvas.height + 5;
        if(d.y > canvas.height + 5) d.y = -5;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
