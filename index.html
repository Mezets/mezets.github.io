<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mezets</title>
  <link rel="icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Press Start 2P', monospace;
      background: #050000;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    canvas { position: fixed; inset: 0; z-index: 0; }

    .fluff-wrap { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .fluff { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.25; }
    .fluff-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(255,0,0,0.9), rgba(180,0,0,0.3), transparent 70%);
      animation: moveFluff1 18s ease-in-out infinite;
    }
    .fluff-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,60,0,0.8), rgba(200,0,0,0.2), transparent 70%);
      animation: moveFluff2 12s ease-in-out infinite;
      opacity: 0.18;
    }
    @keyframes moveFluff1 {
      0%   { transform: translate(5vw,  10vh); }
      25%  { transform: translate(55vw, 20vh); }
      50%  { transform: translate(60vw, 60vh); }
      75%  { transform: translate(15vw, 65vh); }
      100% { transform: translate(5vw,  10vh); }
    }
    @keyframes moveFluff2 {
      0%   { transform: translate(70vw, 70vh); }
      33%  { transform: translate(10vw, 50vh); }
      66%  { transform: translate(50vw, 5vh);  }
      100% { transform: translate(70vw, 70vh); }
    }

    .main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      z-index: 2;
      padding: 60px 20px;
      perspective: 1200px;
    }

    .card {
      width: 360px;
      padding: 30px 26px;
      border-radius: 22px;
      background: rgba(255,0,0,0.05);
      border: 1px solid rgba(255,0,0,0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(255,0,0,0.12);
      transition: border-color .25s, box-shadow .25s, transform .1s ease-out;
      transform-style: preserve-3d;
      will-change: transform;
      cursor: default;
    }
    .card:hover { border-color: rgba(255,0,0,0.4); box-shadow: 0 0 56px rgba(255,0,0,0.2); }

    .avatar-wrap { position: relative; width: 115px; margin: 0 auto 12px; }
    .avatar { width: 115px; height: 115px; border-radius: 50%; object-fit: cover; display: block; border: 2px solid rgba(255,0,0,0.35); }

    .name { text-align: center; font-size: 15px; line-height: 1.6; color: #ff2a2a; margin-bottom: 22px; letter-spacing: 1px; }

    .btn {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 12px; margin: 10px 0; text-align: center; text-decoration: none;
      font-family: 'Press Start 2P', monospace; font-size: 11px; line-height: 1.6;
      color: #ff3b3b; border-radius: 12px;
      background: rgba(255,0,0,0.05); border: 1px solid rgba(255,0,0,0.25);
      transition: .2s; position: relative; overflow: hidden;
    }
    .btn::before {
      content: ""; position: absolute; top: 0; left: -120%; width: 120%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,0,0,0.35), transparent);
      transition: .5s;
    }
    .btn:hover::before { left: 120%; }
    .btn:hover { transform: scale(1.04); border-color: rgba(255,0,0,0.5); }

    @media (prefers-reduced-motion: reduce) { .fluff-1, .fluff-2 { animation: none; } }
    @media (max-width: 760px) {
      .main { gap: 24px; padding: 40px 16px; }
      .card { width: 100%; max-width: 360px; }
    }

  </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="fluff-wrap">
  <div class="fluff fluff-1"></div>
  <div class="fluff fluff-2"></div>
</div>

<div class="main">

  <!-- КАРТОЧКА СО ССЫЛКАМИ -->
  <div class="card" id="card1">
    <div class="avatar-wrap">
      <img src="avatar.png" class="avatar" alt="Mezets">
    </div>
    <div class="name">Mezets</div>
    <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
    <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">Faceit</a>
    <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
    <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>
    <a class="btn" href="https://t.me/+lCBBELOA7U4wMTdi" target="_blank">Telegram</a>
    <a class="btn" href="https://www.tiktok.com/@mezets1337" target="_blank">TikTok</a>
  </div>

</div>

<script>

  /* =========================
     3D НАКЛОН
  ========================= */
  function tilt(card) {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - 0.5;
      const y = (e.clientY - r.top)  / r.height - 0.5;
      card.style.transform = `rotateY(${x*16}deg) rotateX(${-y*16}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave', () => { card.style.transform = 'rotateY(0) rotateX(0) scale(1)'; });
  }
  tilt(document.getElementById('card1'));

  /* =========================
     ЧАСТИЦЫ
  ========================= */
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); addEventListener('resize', resize);
  let dots = [];
  function initDots() {
    dots = [];
    const n = Math.round((innerWidth * innerHeight) / 9000);
    for (let i = 0; i < n; i++) dots.push({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height,
      r: Math.random()*1.3+0.3, dx:(Math.random()-.5)*.15, dy:(Math.random()-.5)*.15
    });
  }
  initDots(); addEventListener('resize', initDots);
  const noMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let d of dots) {
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,0,0,0.6)'; ctx.fill();
      d.x+=d.dx; d.y+=d.dy;
      if(d.x<0)d.x=canvas.width; if(d.x>canvas.width)d.x=0;
      if(d.y<0)d.y=canvas.height; if(d.y>canvas.height)d.y=0;
    }
    requestAnimationFrame(animate);
  }
  if (!noMotion) animate();
  else for (let d of dots) { ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fillStyle='rgba(255,0,0,0.6)'; ctx.fill(); }

</script>
</body>
</html>
