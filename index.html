<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Press Start 2P',monospace;background:#050000;min-height:100vh;overflow-x:hidden}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}
canvas{position:fixed;inset:0;z-index:0}
.nebula{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(circle at 30% 40%,rgba(255,0,0,0.2),transparent 60%),
             radial-gradient(circle at 70% 60%,rgba(255,0,0,0.1),transparent 65%);
  filter:blur(90px);animation:breathe 8s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}

.main{display:flex;flex-wrap:wrap;justify-content:center;gap:40px;z-index:2;padding:60px 20px;perspective:1200px}

.card{
  width:360px;padding:30px 26px;border-radius:22px;
  background:rgba(255,0,0,0.05);border:1px solid rgba(255,0,0,0.2);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(255,0,0,0.12);
  transition:border-color .25s,box-shadow .25s,transform .1s ease-out;
  transform-style:preserve-3d;will-change:transform;cursor:default}
.card:hover{border-color:rgba(255,0,0,0.4);box-shadow:0 0 56px rgba(255,0,0,0.2)}

.avatar-wrap{position:relative;width:115px;margin:0 auto 12px}
.avatar{width:115px;height:115px;border-radius:50%;object-fit:cover;display:block;border:2px solid rgba(255,0,0,0.35)}

.name{text-align:center;font-size:18px;line-height:1.6;font-weight:400;color:#ff2a2a;margin-bottom:22px;letter-spacing:1px}
.ds-name{text-align:center;font-size:11px;line-height:1.6;font-weight:400;color:#ff2a2a;margin-bottom:16px;letter-spacing:1px}

.btn{
  display:flex;align-items:center;justify-content:center;
  padding:16px 12px;margin:10px 0;text-align:center;text-decoration:none;
  font-weight:400;font-size:11px;line-height:1.6;color:#ff3b3b;border-radius:12px;
  background:rgba(255,0,0,0.05);border:1px solid rgba(255,0,0,0.25);
  transition:.2s;position:relative;overflow:hidden;font-family:'Press Start 2P',monospace}
.btn::before{content:"";position:absolute;top:0;left:-120%;width:120%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,0,0,0.35),transparent);transition:.5s}
.btn:hover::before{left:120%}
.btn:hover{transform:scale(1.04);border-color:rgba(255,0,0,0.5)}

.stats{text-align:center}
.stat-block{margin:18px 0}

.big{font-size:17px;line-height:1.6;font-weight:400;color:white;font-variant-numeric:tabular-nums}
.big.online-value{display:flex;align-items:center;justify-content:center;gap:10px;color:#ff3b3b}
.live-dot{width:10px;height:10px;border-radius:50%;background:#ff2a2a;
  box-shadow:0 0 8px rgba(255,0,0,0.9);animation:pulse 1.8s ease-in-out infinite}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.85)}}

.label{
  font-size:8px;line-height:1.6;letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,200,200,0.75);margin:10px 0;
  display:flex;align-items:center;justify-content:center}

.stars{display:flex;justify-content:center;gap:6px;margin:10px 0}
.star{font-size:22px;color:rgba(255,255,255,0.2);transition:color .3s,text-shadow .3s}
.star.full{color:#ff2a2a;text-shadow:0 0 10px rgba(255,0,0,0.6)}

@media(prefers-reduced-motion:reduce){.nebula,.live-dot{animation:none}}
@media(max-width:760px){.main{gap:24px;padding:40px 16px}.card{width:100%;max-width:360px}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main">

  <!-- PROFILE -->
  <div class="card" id="card1">
    <div class="avatar-wrap">
      <img src="avatar.png" class="avatar" alt="Mezets">
    </div>
    <div class="name">Mezets</div>
    <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
    <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">Faceit</a>
    <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
    <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>
  </div>

  <!-- STATS / DISCORD -->
  <div class="card stats" id="card2">
    <div class="avatar-wrap">
      <img src="avatar_server.png" class="avatar" alt="Discord Server">
    </div>
    <div class="ds-name">Discord Server</div>

    <!-- ORDERS -->
    <div class="stat-block">
      <div class="big" id="orders">0</div>
      <div class="label">Заказы</div>
    </div>

    <!-- STARS -->
    <div class="stat-block">
      <div class="stars" id="stars">
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
      </div>
      <div class="label">Рейтинг</div>
    </div>

    <!-- PERIOD -->
    <div class="stat-block">
      <div class="big" id="period" style="font-size:12px">—</div>
      <div class="label">Период</div>
    </div>

    <!-- ONLINE -->
    <div class="stat-block">
      <div class="big online-value">
        <span class="live-dot"></span>
        <span id="online">0</span>
      </div>
      <div class="label">Онлайн сейчас</div>
    </div>

    <a class="btn" href="https://discord.gg/npZ3QDQjVR" target="_blank" style="margin-top:16px">
      Вступить в Discord
    </a>
  </div>

</div>

<script>
/* ── COUNT-UP ── */
function animateCount(el, target, duration) {
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
    el.textContent = Math.round(target * ease);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

/* ── STARS ── */
function animateStars(count) {
  document.querySelectorAll('#stars .star').forEach((s, i) => {
    s.classList.remove('full');
    if (i < count) setTimeout(() => s.classList.add('full'), i * 200);
  });
}

function extractRating(v) {
  if (!v) return 0;
  const m = String(v).match(/([\d.]+)/);
  return m ? parseFloat(m[1]) : 0;
}
function extractNumber(v) {
  if (!v) return 0;
  const m = String(v).match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}
function safe(v) { return v ?? '—'; }

let prevOrders = null, prevOnline = null, prevRating = null, firstLoad = true;

async function loadStats() {
  try {
    const res = await fetch('https://mez-production.up.railway.app/stats', { mode: 'cors' });
    if (!res.ok) throw new Error();
    const d = await res.json();

    const orders = extractNumber(d.total_orders);
    const online = typeof d.online === 'number' ? d.online : extractNumber(d.online);
    const rating = Math.round(extractRating(d.average_rating));

    if (firstLoad || prevOrders !== orders) {
      animateCount(document.getElementById('orders'), orders, firstLoad ? 1400 : 600);
      prevOrders = orders;
    }
    if (firstLoad || prevOnline !== online) {
      animateCount(document.getElementById('online'), online, firstLoad ? 1000 : 500);
      prevOnline = online;
    }
    if (firstLoad || prevRating !== rating) {
      animateStars(rating);
      prevRating = rating;
    }

    document.getElementById('period').textContent = safe(d.period);
    firstLoad = false;

  } catch(e) {
    document.getElementById('orders').textContent = '—';
    document.getElementById('period').textContent = '—';
    document.getElementById('online').textContent = '—';
  }
}
loadStats();
setInterval(loadStats, 5000);

/* ── 3D TILT ── */
function tilt(card) {
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    card.style.transform = `rotateY(${x*16}deg) rotateX(${-y*16}deg) scale(1.02)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
  });
}
tilt(document.getElementById('card1'));
tilt(document.getElementById('card2'));

/* ── PARTICLES ── */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

let dots = [];
function initDots() {
  dots = [];
  const n = Math.round((innerWidth * innerHeight) / 9000);
  for (let i = 0; i < n; i++) dots.push({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*1.3+0.3, dx:(Math.random()-.5)*.15, dy:(Math.random()-.5)*.15
  });
}
initDots(); addEventListener('resize', initDots);

const noMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let d of dots) {
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,0,0,0.6)'; ctx.fill();
    d.x+=d.dx; d.y+=d.dy;
    if(d.x<0)d.x=canvas.width; if(d.x>canvas.width)d.x=0;
    if(d.y<0)d.y=canvas.height; if(d.y>canvas.height)d.y=0;
  }
  requestAnimationFrame(animate);
}
if (!noMotion) animate();
else for (let d of dots) { ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fillStyle='rgba(255,0,0,0.6)'; ctx.fill(); }
</script>
</body>
</html>
