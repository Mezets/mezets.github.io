<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Segoe UI, sans-serif;
    background:#05060c;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🌌 cosmic smoke */
.smoke{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,59,59,0.12), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(140,0,255,0.08), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0,255,200,0.05), transparent 60%);
    filter: blur(45px);
    animation:smokeflow 12s ease-in-out infinite;
    z-index:0;
    pointer-events:none;
}

@keyframes smokeflow{
    0%,100%{transform:scale(1) translate(0,0);}
    50%{transform:scale(1.15) translate(-25px,15px);}
}

/* 🌌 particles */
canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:0;
}

/* 💠 card */
.card{
    position:relative;
    z-index:2;
    width:360px;
    padding:35px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,59,59,0.25);
    animation:float 4s ease-in-out infinite;
    box-shadow:0 0 40px rgba(255,59,59,0.12);
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,59,59,0.4);
    box-shadow:0 0 25px rgba(255,59,59,0.25);
    margin-bottom:18px;
}

.name{
    color:#fff;
    font-size:32px;
    text-shadow:0 0 18px rgba(255,59,59,0.6);
}

.subtitle{
    color:#9ca3af;
    margin:10px 0 25px;
}

/* ⚡ buttons */
.btn{
    display:block;
    text-decoration:none;
    color:#ff3b3b;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    background:rgba(255,59,59,0.05);
    border:1px solid rgba(255,59,59,0.25);
    transition:0.25s;
    position:relative;
    overflow:hidden;
}

/* glow sweep */
.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,59,59,0.25), transparent);
    transition:0.6s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:scale(1.06);
    box-shadow:0 0 25px rgba(255,59,59,0.4);
    background:rgba(255,59,59,0.12);
}
</style>
</head>

<body>

<!-- 🌌 smoke -->
<div class="smoke"></div>

<!-- 🌌 particles -->
<canvas id="bg"></canvas>

<div class="card">

    <img src="avatar.png" class="avatar" alt="avatar">

    <div class="name">Mezets</div>
    <div class="subtitle">42</div>

    <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
    <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">FACEIT</a>
    <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
    <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>

</div>

<!-- 🔊 sound -->
<audio id="hoverSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

<script>

/* 🌌 particles */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<75;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5)*0.5,
        dy:(Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,59,59,0.6)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    }

    requestAnimationFrame(animate);
}
animate();

/* 🔊 sound fix */
const sound = document.getElementById("hoverSound");

function playSound(){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
}

/* unlock audio */
document.body.addEventListener("click", playSound, { once:true });

document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("mouseenter", ()=>{
        playSound();
    });
});

/* resize */
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<script>
const sound = document.getElementById("hoverSound");

document.body.addEventListener("click", ()=>{
    sound.play().catch(()=>{});
}, { once:true });

document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("mouseenter", ()=>{
        sound.currentTime = 0;
        sound.play().catch(()=>{});
    });
});
</script>

<script>
const sound = document.getElementById("clickSound");

/* разблокировка звука */
document.addEventListener("click", () => {
    sound.play().then(() => {
        sound.pause();
        sound.currentTime = 0;
    }).catch(()=>{});
}, { once:true });

/* hover звук */
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("mouseenter", () => {
        sound.currentTime = 0;
        sound.play().catch(err=>{
            console.log("sound blocked:", err);
        });
    });
});
</script>
    
</body>
</html>
