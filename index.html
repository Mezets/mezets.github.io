<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#111827,#1e293b,#0f172a);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    font-family:Segoe UI,sans-serif;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:350px;
    padding:35px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,0.2);
    margin-bottom:20px;
}

.name{
    color:white;
    font-size:32px;
    font-weight:700;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px rgba(255,255,255,.3);
    }
    to{
        text-shadow:0 0 20px rgba(255,255,255,.8);
    }
}

.subtitle{
    color:#9ca3af;
    margin:10px 0 25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:rgba(255,255,255,0.15);
}
</style>
</head>
<body>

<div class="card">

<img src="ССЫЛКА_НА_АВАТАРКУ" class="avatar">

<div class="name">Mezets</div>

<div class="subtitle">Gaming Profile</div>

<a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>

<a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">FACEIT</a>

<a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>

<a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>

</div>

</body>
</html>
