<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mezets</title>
  <link rel="icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>

    /* =========================
       СБРОС И БАЗОВЫЕ СТИЛИ
    ========================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Press Start 2P', monospace;
      background: #050000;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* =========================
       ФОН: ЧАСТИЦЫ (canvas)
    ========================= */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* =========================
       ДВИЖУЩИЙСЯ КРАСНЫЙ ПУШ
       Два слоя — двигаются в разные стороны,
       создавая эффект живого свечения
    ========================= */
    .fluff-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .fluff {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
    }

    /* большой медленный шар */
    .fluff-1 {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255,0,0,0.9), rgba(180,0,0,0.3), transparent 70%);
      animation: moveFluff1 18s ease-in-out infinite;
    }

    /* маленький быстрый шар */
    .fluff-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,60,0,0.8), rgba(200,0,0,0.2), transparent 70%);
      animation: moveFluff2 12s ease-in-out infinite;
      opacity: 0.18;
    }

    @keyframes moveFluff1 {
      0%   { transform: translate(5vw,  10vh); }
      25%  { transform: translate(55vw, 20vh); }
      50%  { transform: translate(60vw, 60vh); }
      75%  { transform: translate(15vw, 65vh); }
      100% { transform: translate(5vw,  10vh); }
    }

    @keyframes moveFluff2 {
      0%   { transform: translate(70vw, 70vh); }
      33%  { transform: translate(10vw, 50vh); }
      66%  { transform: translate(50vw, 5vh);  }
      100% { transform: translate(70vw, 70vh); }
    }

    /* =========================
       ОСНОВНОЙ КОНТЕЙНЕР
    ========================= */
    .main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      z-index: 2;
      padding: 60px 20px;
      perspective: 1200px;
    }

    /* =========================
       КАРТОЧКА
    ========================= */
    .card {
      width: 360px;
      padding: 30px 26px;
      border-radius: 22px;

      background: rgba(255, 0, 0, 0.05);
      border: 1px solid rgba(255, 0, 0, 0.2);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.12);

      transition: border-color 0.25s, box-shadow 0.25s, transform 0.1s ease-out;
      transform-style: preserve-3d;
      will-change: transform;
      cursor: default;
    }

    .card:hover {
      border-color: rgba(255, 0, 0, 0.4);
      box-shadow: 0 0 56px rgba(255, 0, 0, 0.2);
    }

    /* =========================
       АВАТАРКИ
    ========================= */
    .avatar-wrap {
      position: relative;
      width: 115px;
      margin: 0 auto 12px;
    }

    .avatar {
      width: 115px;
      height: 115px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(255, 0, 0, 0.35);
    }

    /* =========================
       ИМЕНА — одинаковый размер на обеих карточках
    ========================= */
    .name {
      text-align: center;
      font-size: 15px;   /* одинаковый размер */
      line-height: 1.6;
      color: #ff2a2a;
      margin-bottom: 22px;
      letter-spacing: 1px;
    }

    /* =========================
       КНОПКИ-ССЫЛКИ
    ========================= */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      margin: 10px 0;
      text-align: center;
      text-decoration: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: #ff3b3b;
      border-radius: 12px;
      background: rgba(255, 0, 0, 0.05);
      border: 1px solid rgba(255, 0, 0, 0.25);
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }

    /* блик при наведении */
    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,0,0,0.35), transparent);
      transition: 0.5s;
    }

    .btn:hover::before { left: 120%; }
    .btn:hover {
      transform: scale(1.04);
      border-color: rgba(255, 0, 0, 0.5);
    }

    /* =========================
       СТАТИСТИКА (правая карточка)
    ========================= */
    .stats {
      text-align: center;
    }

    .stat-block {
      margin: 18px 0;
    }

    /* большое число */
    .big {
      font-size: 17px;
      line-height: 1.6;
      color: white;
      font-variant-numeric: tabular-nums;
    }

    /* строка онлайн с мигающей точкой */
    .big.online-value {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #ff3b3b;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff2a2a;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.9);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;    transform: scale(1);    }
      50%       { opacity: 0.45; transform: scale(0.85); }
    }

    /* подпись под числом */
    .label {
      font-size: 8px;
      line-height: 1.6;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255, 200, 200, 0.75);
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* =========================
       ЗВЁЗДЫ РЕЙТИНГА
    ========================= */
    .stars {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 10px 0;
    }

    .star {
      font-size: 22px;
      color: rgba(255, 255, 255, 0.2);
      transition: color 0.3s, text-shadow 0.3s;
    }

    .star.full {
      color: #ff2a2a;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
    }

    /* =========================
       АДАПТИВ
    ========================= */
    @media (prefers-reduced-motion: reduce) {
      .nebula, .live-dot, .fluff-1, .fluff-2 { animation: none; }
    }

    @media (max-width: 760px) {
      .main { gap: 24px; padding: 40px 16px; }
      .card { width: 100%; max-width: 360px; }
    }

  </style>
</head>
<body>

  <!-- Частицы на фоне -->
  <canvas id="bg"></canvas>

  <!-- Движущийся красный пуш -->
  <div class="fluff-wrap">
    <div class="fluff fluff-1"></div>
    <div class="fluff fluff-2"></div>
  </div>

  <!-- =====================
       ОСНОВНОЙ КОНТЕНТ
  ===================== -->
  <div class="main">

    <!-- ==================
         ЛЕВАЯ КАРТОЧКА: профиль
    ================== -->
    <div class="card" id="card1">

      <div class="avatar-wrap">
        <img src="avatar.png" class="avatar" alt="Mezets">
      </div>

      <!-- font-size такой же как у ds-name — 15px -->
      <div class="name">Mezets</div>

      <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
      <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">Faceit</a>
      <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
      <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>

    </div>

    <!-- ==================
         ПРАВАЯ КАРТОЧКА: Discord + статистика
    ================== -->
    <div class="card stats" id="card2">

      <div class="avatar-wrap">
        <img src="avatar_server.png" class="avatar" alt="Discord Server">
      </div>

      <!-- font-size такой же как у .name — 15px -->
      <div class="name">Discord Server</div>

      <!-- Заказы -->
      <div class="stat-block">
        <div class="big" id="orders">0</div>
        <div class="label">Заказы</div>
      </div>

      <!-- Рейтинг -->
      <div class="stat-block">
        <div class="stars" id="stars">
          <div class="star">★</div>
          <div class="star">★</div>
          <div class="star">★</div>
          <div class="star">★</div>
          <div class="star">★</div>
        </div>
        <div class="label">Рейтинг</div>
      </div>

      <!-- Период -->
      <div class="stat-block">
        <div class="big" id="period" style="font-size: 12px;">—</div>
        <div class="label">Период</div>
      </div>

      <!-- Онлайн -->
      <div class="stat-block">
        <div class="big online-value">
          <span class="live-dot"></span>
          <span id="online">0</span>
        </div>
        <div class="label">Онлайн сейчас</div>
      </div>

      <a class="btn" href="https://discord.gg/npZ3QDQjVR" target="_blank" style="margin-top: 16px;">
        Вступить в Discord
      </a>

    </div>

  </div>


  <script>

    /* =========================
       АНИМАЦИЯ ЧИСЛА (счётчик от 0 до target)
    ========================= */
    function animateCount(el, target, duration) {
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        el.textContent = Math.round(target * ease);
        if (progress < 1) requestAnimationFrame(step);
        else el.textContent = target;
      }
      requestAnimationFrame(step);
    }

    /* =========================
       АНИМАЦИЯ ЗВЁЗД (загораются по очереди)
    ========================= */
    function animateStars(count) {
      document.querySelectorAll('#stars .star').forEach((star, i) => {
        star.classList.remove('full');
        if (i < count) {
          setTimeout(() => star.classList.add('full'), i * 200);
        }
      });
    }

    /* =========================
       ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    ========================= */
    function extractNumber(v) {
      if (!v) return 0;
      const m = String(v).match(/(\d+)/);
      return m ? parseInt(m[1]) : 0;
    }

    function extractRating(v) {
      if (!v) return 0;
      const m = String(v).match(/([\d.]+)/);
      return m ? parseFloat(m[1]) : 0;
    }

    function safe(v) { return v ?? '—'; }

    /* =========================
       ЗАГРУЗКА СТАТИСТИКИ С API
    ========================= */
    let prevOrders = null;
    let prevOnline = null;
    let prevRating = null;
    let firstLoad  = true;

    async function loadStats() {
      try {
        const res = await fetch('https://mez-production.up.railway.app/stats', { mode: 'cors' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const orders = extractNumber(data.total_orders);
        const online = typeof data.online === 'number' ? data.online : extractNumber(data.online);
        const rating = Math.round(extractRating(data.average_rating));

        if (firstLoad || prevOrders !== orders) {
          animateCount(document.getElementById('orders'), orders, firstLoad ? 1400 : 600);
          prevOrders = orders;
        }

        if (firstLoad || prevOnline !== online) {
          animateCount(document.getElementById('online'), online, firstLoad ? 1000 : 500);
          prevOnline = online;
        }

        if (firstLoad || prevRating !== rating) {
          animateStars(rating);
          prevRating = rating;
        }

        document.getElementById('period').textContent = safe(data.period);
        firstLoad = false;

      } catch (e) {
        document.getElementById('orders').textContent = '—';
        document.getElementById('period').textContent = '—';
        document.getElementById('online').textContent = '—';
      }
    }

    loadStats();
    setInterval(loadStats, 5000);

    /* =========================
       3D-НАКЛОН КАРТОЧЕК
    ========================= */
    function tilt(card) {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width  - 0.5;
        const y = (e.clientY - rect.top)  / rect.height - 0.5;
        card.style.transform = `rotateY(${x * 16}deg) rotateX(${-y * 16}deg) scale(1.02)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
      });
    }

    tilt(document.getElementById('card1'));
    tilt(document.getElementById('card2'));

    /* =========================
       ЧАСТИЦЫ НА ФОНЕ
    ========================= */
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = innerWidth;
      canvas.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    let dots = [];

    function initDots() {
      dots = [];
      const count = Math.round((innerWidth * innerHeight) / 9000);
      for (let i = 0; i < count; i++) {
        dots.push({
          x:  Math.random() * canvas.width,
          y:  Math.random() * canvas.height,
          r:  Math.random() * 1.3 + 0.3,
          dx: (Math.random() - 0.5) * 0.15,
          dy: (Math.random() - 0.5) * 0.15
        });
      }
    }
    initDots();
    addEventListener('resize', initDots);

    const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let d of dots) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 0, 0, 0.6)';
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if (d.x < 0) d.x = canvas.width;
        if (d.x > canvas.width)  d.x = 0;
        if (d.y < 0) d.y = canvas.height;
        if (d.y > canvas.height) d.y = 0;
      }

      requestAnimationFrame(animate);
    }

    if (!noMotion) {
      animate();
    } else {
      for (let d of dots) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 0, 0, 0.6)';
        ctx.fill();
      }
    }

  </script>
</body>
</html>
