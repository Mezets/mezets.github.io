<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Rajdhani','Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050000;
}

/* 🌌 STAR CANVAS */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* 🔴 NEBULA BACKGROUND */
.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;

    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.25), transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(180,0,0,0.12), transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(255,0,0,0.08), transparent 65%);

    filter: blur(90px);
}

/* layout */
.main-container{
    display:flex;
    gap:40px;
    z-index:2;
    transition: transform 0.08s linear;
}

/* card */
.card{
    width:340px;
    padding:28px;
    border-radius:20px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.3);
    backdrop-filter:blur(25px);

    box-shadow:0 0 35px rgba(255,0,0,0.2);

    transition: transform 0.08s linear;
}

/* avatar */
.avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    margin:0 auto 12px;
    display:block;
    border:2px solid rgba(255,0,0,0.4);
}

/* name */
.name{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#ff2a2a;
    margin-bottom:18px;
}

/* buttons */
.btn{
    display:block;
    padding:12px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;
    color:#ff3b3b;
    border:1px solid rgba(255,0,0,0.25);
    border-radius:12px;
    background:rgba(255,0,0,0.06);
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
    background:rgba(255,0,0,0.15);
}

/* stats */
.stats-card{
    text-align:left;
}

.stat-block{
    margin-bottom:22px;
}

.stat-label{
    font-size:12px;
    color:rgba(255,120,120,0.9);
    margin-bottom:6px;
    font-weight:600;
}

.stat-value{
    font-size:15px;
    color:#fff;
}

/* ⭐ stars */
.stars{
    display:flex;
    gap:6px;
    margin-bottom:6px;
}

.star{
    font-size:22px;
    color:#ff2a2a;
    text-shadow:0 0 10px rgba(255,0,0,0.5);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<div class="nebula" id="nebula"></div>

<div class="main-container" id="container">

<!-- PROFILE -->
<div class="card" id="card1">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn" href="#">Steam</a>
    <a class="btn" href="#">FACEIT</a>
    <a class="btn" href="#">Epic Games</a>
    <a class="btn" href="#">Roblox</a>
</div>

<!-- STATS -->
<div class="card" id="card2">

    <div class="name" style="font-size:22px;">Discord Server</div>

    <div class="stat-block">
        <div class="stat-label">📦 Заказы</div>
        <div class="stat-value">71 шт.</div>
    </div>

    <div class="stat-block">
        <div class="stat-label">⭐ Рейтинг</div>
        <div class="stars" id="stars"></div>
        <div class="stat-value">5.0 / 5.0</div>
    </div>

    <div class="stat-block">
        <div class="stat-label">📅 Период</div>
        <div class="stat-value">С 2023 года по 2026-05-24 23:41:00</div>
    </div>

</div>

</div>

<script>
/* 🌠 STAR BACKGROUND */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = [];

for(let i=0;i<140;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.4,
        dx:(Math.random()-0.5)*0.2,
        dy:(Math.random()-0.5)*0.2
    });
}

let mx=0,my=0,cx=0,cy=0;

document.addEventListener("mousemove",(e)=>{
    mx=(e.clientX/innerWidth-0.5)*40;
    my=(e.clientY/innerHeight-0.5)*30;
});

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    cx+=(mx-cx)*0.05;
    cy+=(my-cy)*0.05;

    for(let s of stars){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.7)";
        ctx.fill();

        s.x+=s.dx+cx*0.02;
        s.y+=s.dy+cy*0.02;

        if(s.x<0) s.x=canvas.width;
        if(s.x>canvas.width) s.x=0;
        if(s.y<0) s.y=canvas.height;
        if(s.y>canvas.height) s.y=0;
    }

    document.getElementById("container").style.transform =
        `perspective(900px) rotateY(${cx*0.4}deg) rotateX(${-cy*0.3}deg)`;

    document.getElementById("nebula").style.transform =
        `translate(${cx*0.3}px,${cy*0.3}px)`;

    requestAnimationFrame(animate);
}

animate();

/* ⭐ stars */
const starsContainer=document.getElementById("stars");
for(let i=0;i<5;i++){
    let star=document.createElement("div");
    star.classList.add("star");
    star.textContent="★";
    starsContainer.appendChild(star);
}
</script>

</body>
</html>
