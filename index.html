<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mezets</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

html,body{
    margin:0;
    padding:0;
    background:#050000;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
}

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    height:100vh;
}

.card{
    width:360px;
    height:520px;
    padding:26px;
    border-radius:0;
    background:#0a0000;
    border:1px solid #ff0000;
}

.avatar,
.server-avatar{
    width:120px;
    height:120px;
    display:block;
    margin:0 auto 12px;
    object-fit:cover;
    border:1px solid #ff0000;
}

.name{
    text-align:center;
    font-size:16px;
    color:#ff0000;
    margin-bottom:18px;
}

.btn{
    display:block;
    padding:10px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;
    color:#ff0000;
    border:1px solid #ff0000;
    background:transparent;
}

.block{
    margin:16px 0;
    text-align:center;
}

.label{
    font-size:9px;
    color:#aaa;
}

.value{
    margin-top:8px;
    font-size:14px;
    color:#fff;
}

.stars{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-top:8px;
}

.star{
    color:#444;
    font-size:20px;
}

.star.full{
    color:#ff0000;
}

</style>
</head>

<body>

<div class="main">

<div class="card">
    <img src="avatar.png" class="avatar">

    <div class="name">Mezets</div>

    <a class="btn" href="https://steamcommunity.com/id/mezets/" target="_blank">Steam</a>
    <a class="btn" href="https://www.faceit.com/ru/players/Mezets1337" target="_blank">FACEIT</a>
    <a class="btn" href="https://store.epicgames.com/u/dfdc88256ae04f67959802a29365926f" target="_blank">Epic Games</a>
    <a class="btn" href="https://www.roblox.com/users/817592228/profile" target="_blank">Roblox</a>
</div>

<div class="card">

    <img src="avatar_server.png" class="server-avatar">

    <div class="name">Discord Server</div>

    <div class="block">
        <div class="label">Заказы</div>
        <div class="value" id="orders">—</div>
    </div>

    <div class="block">
        <div class="label">Рейтинг</div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="block">
        <div class="label">Период</div>
        <div class="value" id="period">—</div>
    </div>

    <div class="block">
        <div class="label">Онлайн</div>
        <div class="value" id="online">—</div>
    </div>

</div>

</div>

<script>

function extractRating(value){
    if(!value) return 0;
    const match = String(value).match(/([\d.]+)/);
    return match ? parseFloat(match[1]) : 0;
}

function renderStars(rating){
    const stars = document.getElementById("stars");
    stars.innerHTML = "";

    const rounded = Math.round(rating);

    for(let i=1;i<=5;i++){
        const s = document.createElement("div");
        s.className = "star";
        s.textContent = "★";

        if(i <= rounded){
            s.classList.add("full");
        }

        stars.appendChild(s);
    }
}

function safe(value){
    return value ?? "—";
}

async function loadStats(){
    try{
        const res = await fetch(
            "https://mez-production.up.railway.app/stats",
            { mode: "cors" }
        );

        if(!res.ok) throw new Error();

        const data = await res.json();

        document.getElementById("orders").textContent =
            safe(data.total_orders);

        document.getElementById("period").textContent =
            safe(data.period);

        document.getElementById("online").textContent =
            data.online ?? "—";

        renderStars(extractRating(data.average_rating));

    } catch(err){
        // ❌ больше никаких "API error"
        document.getElementById("orders").textContent = "—";
        document.getElementById("period").textContent = "—";
        document.getElementById("online").textContent = "—";
        renderStars(0);
    }
}

loadStats();
setInterval(loadStats, 5000);

</script>

</body>
</html>
