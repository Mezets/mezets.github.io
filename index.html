<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezets</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL FIX
========================= */
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Rajdhani', sans-serif;
    background: #050000;
    overflow: hidden;
}

/* layout */
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* background */
canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.nebula{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 30% 40%, rgba(255,0,0,0.2), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(255,0,0,0.1), transparent 65%);
    filter:blur(90px);
}

/* MAIN */
.main{
    display:flex;
    gap:40px;
    z-index:2;
}

/* CARD GLASS */
.card{
    width:340px;
    padding:28px;
    border-radius:22px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.2);

    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(255,0,0,0.12);
}

/* AVATARS */
.avatar{
    width:115px;
    height:115px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 12px;
    border:2px solid rgba(255,0,0,0.35);
}

/* SERVER AVATAR FIX */
.server-avatar{
    width:70px;
    height:70px;
    border-radius:16px;
    object-fit:cover;
    display:block;
    margin:0 auto 10px;
    border:1px solid rgba(255,0,0,0.4);
    box-shadow:0 0 18px rgba(255,0,0,0.2);
}

/* NAME */
.name{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#ff2a2a;
    margin-bottom:18px;
}

/* BUTTONS */
.btn{
    display:block;
    padding:12px;
    margin:8px 0;
    text-align:center;
    text-decoration:none;

    color:#ff3b3b;
    border-radius:12px;

    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.25);

    transition:0.2s;
    position:relative;
    overflow:hidden;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,0,0,0.35),transparent);
    transition:0.5s;
}

.btn:hover::before{
    left:120%;
}

.btn:hover{
    transform:scale(1.06);
}

/* STATS */
.stats{
    text-align:center;
}

/* BIG VALUE */
.big{
    font-size:30px;
    font-weight:700;
    color:white;
}

/* LABEL */
.label{
    font-size:12px;
    color:rgba(255,200,200,0.85);
    margin:6px 0;
}

/* STARS */
.stars{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:10px 0;
}

.star{
    font-size:22px;
    color:rgba(255,255,255,0.2);
}

.star.full{
    color:#ff2a2a;
    text-shadow:0 0 10px rgba(255,0,0,0.6);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="nebula"></div>

<div class="main">

<!-- PROFILE -->
<div class="card">
    <img src="avatar.png" class="avatar">
    <div class="name">Mezets</div>

    <a class="btn">Steam</a>
    <a class="btn">FACEIT</a>
    <a class="btn">Epic Games</a>
    <a class="btn">Roblox</a>
</div>

<!-- STATS -->
<div class="card stats">

    <img src="avatar_server.png" class="server-avatar">

    <div class="name" style="font-size:20px;">Discord Server</div>

    <!-- ORDERS -->
    <div class="big" id="totalOrders">71 шт.</div>
    <div class="label">📦 Заказы</div>

    <!-- STARS -->
    <div class="label">⭐ Рейтинг</div>
    <div class="stars" id="stars"></div>

    <!-- PERIOD -->
    <div class="big" id="period">2023 → 2026-05-24</div>
    <div class="label">📅 Период</div>

</div>

</div>

<script>

/* ⭐ STARS (100% WORK) */
document.addEventListener("DOMContentLoaded", () => {
    const el = document.getElementById("stars");
    const rating = 5;

    for(let i=1;i<=5;i++){
        const s = document.createElement("div");
        s.className = "star";
        s.textContent = "★";
        if(i <= rating) s.classList.add("full");
        el.appendChild(s);
    }
});

/* 🌌 BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let dots = [];

for(let i=0;i<120;i++){
    dots.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.3,
        dx:(Math.random()-0.5)*0.15,
        dy:(Math.random()-0.5)*0.15
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,0,0,0.6)";
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x<0) d.x=canvas.width;
        if(d.x>canvas.width) d.x=0;
        if(d.y<0) d.y=canvas.height;
        if(d.y>canvas.height) d.y=0;
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
