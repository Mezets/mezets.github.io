<head>

<title>Mezets</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial,sans-serif;
}

.card{
    text-align:center;
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 25px rgba(0,255,255,.2);

h1{
    color:white;
}

p{
    color:#94a3b8;

.btn{
    display:block;
    margin:12px 0;
    padding:14px;
    text-decoration:none;
    color:white;
    background:#2563eb;
    border-radius:12px;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#3b82f6;
}
</style>
</head>

<body>

<div class="card">
    <h1>Mezets</h1>
